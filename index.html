<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Social Space</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #090d14;
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Animated background glows */
.background-glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
}

.glow1 {
    width: 350px;
    height: 350px;
    background: rgba(45,108,223,0.35);
    top: 80px;
    left: 50px;
}

.glow2 {
    width: 300px;
    height: 300px;
    background: rgba(0,255,255,0.18);
    right: 80px;
    bottom: 80px;
}

/* Top bar */
.topbar {
    position: sticky;
    top: 0;
    z-index: 999;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    background: rgba(13,18,28,0.75);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    font-size: 24px;
    font-weight: 700;
    color: #58a6ff;
    text-shadow: 0 0 20px rgba(88,166,255,0.5);
}

.nav-icons {
    display: flex;
    gap: 20px;
    font-size: 22px;
}

/* Layout */
.layout {
    display: grid;
    grid-template-columns: 250px 1fr 260px;
    gap: 25px;
    padding: 30px;
}

/* Sidebar */
.sidebar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
    height: fit-content;
}

.menu-item {
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.menu-item:hover,
.active {
    background: rgba(88,166,255,0.18);
}

/* Feed */
.feed-area {
    width: 100%;
}

/* Input Card */
.input-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 25px;
}

.input-card h3 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.35);
    color: white;
    font-size: 15px;
    outline: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #2d6cdf, #58a6ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(88,166,255,0.45);
}

/* Feed */
#feed {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* Posts */
.post {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    animation: fadeUp 0.4s ease;
}

.post-header {
    display: flex;
    align-items: center;
    gap: 12px;
}

.avatar {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d6cdf, cyan);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

.name {
    font-weight: 700;
}

.post-text {
    margin: 18px 0;
    color: #d6d6d6;
}

.actions {
    display: flex;
    gap: 12px;
}

.action-btn {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px;
    border-radius: 12px;
    color: white;
    cursor: pointer;
}

/* Right panel */
.right-panel {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 25px;
    height: fit-content;
}

.trend-card {
    padding: 14px;
    border-radius: 14px;
    margin-top: 12px;
    background: rgba(255,255,255,0.04);
}

/* Floating button */
.floating-post {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    font-size: 30px;
    z-index: 1000;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="background-glow glow1"></div>
    <div class="background-glow glow2"></div>

    <!-- Top Navbar -->
    <header class="topbar">
        <div class="logo">Social Space</div>

        <div class="nav-icons">
            <span>🔔</span>
            <span>💬</span>
            <span>👤</span>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="menu-item active">🏠 Home</div>
            <div class="menu-item">🔥 Trending</div>
            <div class="menu-item">👥 Friends</div>
            <div class="menu-item">⚙ Settings</div>
        </aside>

        <!-- Main Feed -->
        <main class="feed-area">

            <!-- Post Input -->
            <div class="input-card">
                <h3>Create Post</h3>
                <input id="textInput" placeholder="What's on your mind?" />
                <button onclick="post()">Post</button>
            </div>

            <!-- Posts Render Here -->
            <div id="feed"></div>

        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <h3>Trending</h3>

            <div class="trend-card">#Technology</div>
            <div class="trend-card">#AI</div>
            <div class="trend-card">#Gaming</div>
            <div class="trend-card">#Sports</div>
        </aside>

    </div>

    <!-- Floating Button -->
    <button class="floating-post">+</button>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJxIvRTvDSfJWQJ6L4et9wwc1CAuDC-To",
  authDomain: "short-stuff-2450e.firebaseapp.com",
  projectId: "short-stuff-2450e",
  storageBucket: "short-stuff-2450e.firebasestorage.app",
  messagingSenderId: "896780231019",
  appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");
const textInput = document.getElementById("textInput");

/* Create post */
window.post = async function () {
    const text = textInput.value.trim();

    if (!text) return;

    try {
        await addDoc(collection(db, "posts"), {
            username: "Neo",
            text: text,
            likes: 0,
            createdAt: serverTimestamp()
        });

        textInput.value = "";
    } catch (error) {
        console.error(error);
        alert("Post failed.");
    }
};

/* Live feed */
const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
    feed.innerHTML = "";

    snapshot.forEach((doc) => {
        const post = doc.data();

        const card = document.createElement("div");
        card.className = "post";

        card.innerHTML = `
            <div class="post-header">
                <div class="avatar">${post.username ? post.username[0] : "U"}</div>
                <div>
                    <div class="name">${post.username || "Unknown"}</div>
                    <small>Just posted</small>
                </div>
            </div>

            <div class="post-text">${post.text}</div>

            <div class="actions">
                <button class="action-btn">❤️ Like</button>
                <button class="action-btn">💬 Comment</button>
                <button class="action-btn">↗ Share</button>
            </div>
        `;

        feed.appendChild(card);
    });
});
