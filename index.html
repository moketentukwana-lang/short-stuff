<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Social Space</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* PART 2 CSS GOES HERE */
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="background-glow glow1"></div>
    <div class="background-glow glow2"></div>

    <!-- Top Navbar -->
    <header class="topbar">
        <div class="logo">Social Space</div>

        <div class="nav-icons">
            <span>🔔</span>
            <span>💬</span>
            <span>👤</span>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="layout">

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="menu-item active">🏠 Home</div>
            <div class="menu-item">🔥 Trending</div>
            <div class="menu-item">👥 Friends</div>
            <div class="menu-item">⚙ Settings</div>
        </aside>

        <!-- Main Feed -->
        <main class="feed-area">

            <!-- Post Input -->
            <div class="input-card">
                <h3>Create Post</h3>
                <input id="textInput" placeholder="What's on your mind?" />
                <button onclick="post()">Post</button>
            </div>

            <!-- Posts Render Here -->
            <div id="feed"></div>

        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <h3>Trending</h3>

            <div class="trend-card">#Technology</div>
            <div class="trend-card">#AI</div>
            <div class="trend-card">#Gaming</div>
            <div class="trend-card">#Sports</div>
        </aside>

    </div>

    <!-- Floating Button -->
    <button class="floating-post">+</button>

    <script type="module">
        /* PART 3 JS GOES HERE */
    </script>

</body>
</html>
