<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp,
    updateDoc,
    doc,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig = {
    apiKey: "AIzaSyCJxIvRTvDSfJWQJ6L4et9wwc1CAuDC-To",
    authDomain: "short-stuff-2450e.firebaseapp.com",
    projectId: "short-stuff-2450e",
    storageBucket: "short-stuff-2450e.appspot.com",
    messagingSenderId: "896780231019",
    appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const POSTS_COLLECTION = "posts";
const feed = document.getElementById("feed");
const textInput = document.getElementById("textInput");
const postButton = document.getElementById("postButton");
const floatingPostButton = document.querySelector(".floating-post");
async function createPost(text) {
    const cleanText = text.trim();

    if (!cleanText) {
        alert("Please enter a post.");
        return;
    }

    try {
        postButton.disabled = true;

        await addDoc(collection(db, POSTS_COLLECTION), {
            username: "Neo",
            text: cleanText,
            likes: 0,
            createdAt: serverTimestamp()
        });

        textInput.value = "";

    } catch (error) {
        console.error("Error creating post:", error);
        alert("Failed to create post.");
    } finally {
        postButton.disabled = false;
    }
}
async function likePost(postId) {
    try {
        const postRef = doc(db, POSTS_COLLECTION, postId);

        await updateDoc(postRef, {
            likes: increment(1)
        });

    } catch (error) {
        console.error("Error liking post:", error);
        alert("Failed to like post.");
    }
}
function createPostCard(postId, post) {
    const card = document.createElement("div");
    card.className = "post";

    const username = post.username || "Unknown";
    const avatar = username.charAt(0).toUpperCase();

    const dateText = post.createdAt
        ? post.createdAt.toDate().toLocaleString()
        : "Just posted";

    card.innerHTML = `
        <div class="post-header">
            <div class="avatar">${avatar}</div>

            <div>
                <div class="name">${username}</div>
                <small>${dateText}</small>
            </div>
        </div>

        <div class="post-text"></div>

        <div class="actions">
            <button class="action-btn like-btn">
                ❤️ Like (${post.likes || 0})
            </button>

            <button class="action-btn">
                💬 Comment
            </button>

            <button class="action-btn">
                ↗ Share
            </button>
        </div>
    `;

    card.querySelector(".post-text").textContent = post.text;
    const likeButton = card.querySelector(".like-btn");
    likeButton.addEventListener("click", () => {
        likePost(postId);
    });
    return card;
}
function renderFeed(snapshot) {
    feed.innerHTML = "";
    snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const postCard = createPostCard(docSnap.id, post);
        feed.appendChild(postCard);
    });
}
function setupEventListeners() {
    if (postButton) {
        postButton.addEventListener("click", () => {
            createPost(textInput.value);
        });
    }
    if (textInput) {
        textInput.addEventListener("keydown", (event) => {

            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                createPost(textInput.value);
            }

        });
    }

    if (floatingPostButton) {
        floatingPostButton.addEventListener("click", () => {
            textInput.focus();
        });
    }
}
function initializeFeed() {
    const postsQuery = query(
        collection(db, POSTS_COLLECTION),
        orderBy("createdAt", "desc")
    );
    onSnapshot(postsQuery, renderFeed);
}
setupEventListeners();
initializeFeed();

</script>
