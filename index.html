<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Social Space </title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    color:white;
    background:
        radial-gradient(circle at top right, rgba(0,150,255,.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(0,255,180,.08), transparent 25%),
        linear-gradient(135deg,#05070d,#0b1220 45%,#081018);
}

/* Bubble Background */
.bubbles {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: -1;
    pointer-events: none;
}

.bubbles span {
    position: absolute;
    bottom: -150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.18), transparent 70%);
    filter: blur(8px);
    backdrop-filter: blur(6px);
    animation: floatBubble linear infinite;
}

/* Individual bubble sizes + speeds */
.bubbles span:nth-child(1){
    left:10%;
    width:80px;
    height:80px;
    animation-duration:32s;
}

.bubbles span:nth-child(2){
    left:25%;
    width:140px;
    height:140px;
    animation-duration:40s;
}

.bubbles span:nth-child(3){
    left:45%;
    width:65px;
    height:65px;
    animation-duration:28s;
}

.bubbles span:nth-child(4){
    left:60%;
    width:180px;
    height:180px;
    animation-duration:46s;
}

.bubbles span:nth-child(5){
    left:75%;
    width:90px;
    height:90px;
    animation-duration:34s;
}

.bubbles span:nth-child(6){
    left:88%;
    width:130px;
    height:130px;
    animation-duration:42s;
}

.bubbles span:nth-child(7){
    left:35%;
    width:200px;
    height:200px;
    animation-duration:55s;
}

/* Slow floating animation */
@keyframes floatBubble {
    0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
    }

    10% {
        opacity: 0.35;
    }

    50% {
        transform: translateY(-50vh) translateX(30px) rotate(120deg);
    }

    100% {
        transform: translateY(-120vh) translateX(-40px) rotate(360deg);
        opacity: 0;
    }
}
/* Scrollbar */
::-webkit-scrollbar{
    width:8px;
}
::-webkit-scrollbar-thumb{
    background:#2563eb;
    border-radius:20px;
}

/* Header */
header{
    position:sticky;
    top:0;
    z-index:999;
    height:80px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 40px;
    background:rgba(10,14,24,.75);
    backdrop-filter:blur(25px);
    border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.5px;
}

.logo span{
    color:#3b82f6;
}

.header-right{
    display:flex;
    gap:18px;
    align-items:center;
}

.header-icon{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.06);
    cursor:pointer;
    transition:.25s;
}

.header-icon:hover{
    transform:translateY(-2px);
    background:rgba(59,130,246,.2);
}

/* Main Layout */
.layout{
    display:grid;
    grid-template-columns:260px 1fr 320px;
    gap:24px;
    padding:28px;
}

/* Glass Card */
.glass{
    background:rgba(255,255,255,.03);
    border-radius:22px;
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.05);
}

/* Sidebar */
.sidebar{
    padding:24px;
    height:fit-content;
}

.menu-item{
    display:flex;
    gap:14px;
    align-items:center;
    padding:16px;
    border-radius:16px;
    margin-bottom:10px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.menu-item:hover{
    transform:translateX(6px);
    background:rgba(59,130,246,.12);
}

.active{
    background:linear-gradient(135deg,rgba(59,130,246,.24),rgba(59,130,246,.08));
    border:1px solid rgba(59,130,246,.2);
}

/* Feed Area */
.feed-area{
    padding:26px;
}

/* Hero */
.hero{
    margin-bottom:24px;
    padding:30px;
    border-radius:22px;
    background:
        linear-gradient(135deg, rgba(37,99,235,.35), rgba(0,0,0,.25));
}

.hero h1{
    font-size:32px;
    margin-bottom:10px;
}

.hero p{
    color:#b6c2d8;
}

/* Create Post */
.input-card{
    padding:24px;
    border-radius:22px;
    margin-bottom:25px;
    background:rgba(255,255,255,.03);
}

.input-card h3{
    margin-bottom:16px;
}

textarea{
    width:100%;
    min-height:120px;
    resize:none;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(5,10,20,.9);
    color:white;
    font-size:15px;
    outline:none;
}

textarea:focus{
    border-color:#2563eb;
}

.file-upload{
    margin-top:14px;
}

.file-upload input{
    color:#b9c7df;
}

button{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:16px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

/* Posts */
.post{
    background:rgba(15,20,35,.9);
    border-radius:22px;
    padding:20px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,.05);
}

.post-header{
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{
    width:52px;
    height:52px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:700;
    box-shadow:0 0 25px rgba(37,99,235,.3);
}

.post-text{
    margin-top:18px;
    line-height:1.7;
    color:#d0d8e8;
}

.post-image{
    width:100%;
    margin-top:16px;
    border-radius:18px;
    max-height:500px;
    object-fit:cover;
}

.actions{
    display:flex;
    gap:12px;
    margin-top:18px;
}

.action-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:rgba(255,255,255,.06);
    color:white;
}

/* Right Panel */
.right-panel{
    padding:24px;
    height:fit-content;
}

.trend{
    padding:14px;
    border-radius:14px;
    margin-top:12px;
    background:rgba(255,255,255,.04);
    transition:.2s;
}

.trend:hover{
    background:rgba(59,130,246,.12);
}

/* Floating Button */
.floating-post{
    position:fixed;
    bottom:35px;
    right:35px;
    width:72px;
    height:72px;
    border-radius:50%;
    font-size:34px;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    box-shadow:0 20px 40px rgba(37,99,235,.4);
}

.floating-post:hover{
    transform:scale(1.08);
}

/* Responsive */
@media(max-width:1100px){
    .layout{
        grid-template-columns:1fr;
    }

    .right-panel,
    .sidebar{
        display:none;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">Social <span>Space</span></div>

    <div class="header-right">
        <div class="header-icon">🔔</div>
        <div class="header-icon">💬</div>
        <div class="header-icon">👤</div>
    </div>
</header>

<div class="layout">

    <aside class="sidebar glass">
        <div class="menu-item active">🏠 Home</div>
        <div class="menu-item">🔥 Trending</div>
        <div class="menu-item">👥 Friends</div>
        <div class="menu-item">⚙ Settings</div>
    </aside>

    <main class="feed-area glass">

        <div class="hero">
            <h1>Welcome back</h1>
            <p>Connect. Share. Discover.</p>
        </div>

        <div class="input-card">
            <h3>Create Post</h3>
            <textarea id="textInput" placeholder="Share something..."></textarea>

            <div class="file-upload">
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <button id="postButton">Post</button>
        </div>

        <div id="feed"></div>

    </main>

    <aside class="right-panel glass">
        <h3>Trending</h3>
        <div class="trend">#Technology</div>
        <div class="trend">#AI</div>
        <div class="trend">#Gaming</div>
        <div class="trend">#Sports</div>
    </aside>

</div>

<button class="floating-post">+</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    serverTimestamp,
    doc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyCJxIvRTvDSfJWQJ6L4et9wwc1CAuDC-To",
  authDomain: "short-stuff-2450e.firebaseapp.com",
  projectId: "short-stuff-2450e",
  storageBucket: "short-stuff-2450e.firebasestorage.app",
  messagingSenderId: "896780231019",
  appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* DOM */
const feed = document.getElementById("feed");
const textInput = document.getElementById("textInput");
const imageInput = document.getElementById("imageInput");
const postButton = document.getElementById("postButton");
const floatingButton = document.querySelector(".floating-post");

/* Create Post */
async function createPost() {
    const text = textInput.value.trim();
    const file = imageInput.files[0];

    if (!text && !file) return;

    let imageUrl = "";

    if (file) {
        const storageRef = ref(
            storage,
            `posts/${Date.now()}-${file.name}`
        );

        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    await addDoc(collection(db, "posts"), {
        username: "User", // Replace with actual username if available
        text: text,
        imageUrl: imageUrl
    });

    textInput.value = "";
    imageInput.value = "";
}

/* Like Post */
async function likePost(postId, currentLikes) {
    await updateDoc(doc(db, "posts", postId), {
        likes: currentLikes + 1
    });
}

/* Delete Post */
async function deletePost(postId) {
    await deleteDoc(doc(db, "posts", postId));
}

/* Events */
postButton.addEventListener("click", createPost);

floatingButton.addEventListener("click", () => {
    textInput.focus();
});

textInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        createPost();
    }
});

/* Live Feed Query */
const q = query(
    collection(db, "posts"),
    orderBy("createdAt", "desc")
);
onSnapshot(q, (snapshot) => {
    renderFeed(snapshot);
});

/* Render Feed */
function renderFeed(snapshot) {
    feed.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const post = docSnap.data();

        const card = document.createElement("div");
        card.className = "post";

        card.innerHTML = `
            <div class="post-header">
                <div class="avatar">
                    ${post.username ? post.username[0].toUpperCase() : "U"}
                </div>

                <div>
                    <div style="font-weight:700;">
                        ${post.username || "Unknown"}
                    </div>

                    <small style="color:#94a3b8;">
                        ${
                            post.createdAt
                            ? new Date(post.createdAt.toDate()).toLocaleString()
                            : "Just posted"
                        }
                    </small>
                </div>
            </div>

            ${
                post.text
                    ? `<div class="post-text">${post.text}</div>`
                    : ""
            }

            ${
                post.imageUrl
                    ? `<img class="post-image" src="${post.imageUrl}" />`
                    : ""
            }

            <div class="actions">
                <button class="action-btn like-btn">
                    ❤️ Like (${post.likes || 0})
                </button>

                <button class="action-btn delete-btn">
                    🗑 Delete
                </button>
            </div>
        `;

        card.querySelector(".like-btn").addEventListener("click", () => {
            likePost(docSnap.id, post.likes || 0);
        });

        card.querySelector(".delete-btn").addEventListener("click", () => {
            deletePost(docSnap.id);
        });

        feed.appendChild(card);
    });
}
</script>

</body>
</html>
