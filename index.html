<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social Space</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1115;
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

#feed {
  background: #161a22;
  padding: 15px;
  border-radius: 12px;
  min-height: 400px;
  border: 1px solid #222;
}

.post {
  background: #1b2130;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #2a3142;
}

.input-area {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #2a3142;
  background: #161a22;
  color: white;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Social Space 📱</h1>

  <div class="input-area">
    <input id="textInput" placeholder="Write something...">
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
function post() {
  const text = document.getElementById("textInput").value;
  if (!text) return;

  const feed = document.getElementById("feed");

  const div = document.createElement("div");
  div.className = "post";
  div.innerText = text;

  feed.prepend(div);

  document.getElementById("textInput").value = "";
}
</script>

</body>
</html>
