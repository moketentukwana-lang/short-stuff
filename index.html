<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social Space</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1115;
  color: white;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

#feed {
  background: #161a22;
  padding: 15px;
  border-radius: 12px;
  min-height: 400px;
  border: 1px solid #222;
}

.post {
  background: #1b2130;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #2a3142;
}

.input-area {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #2a3142;
  background: #161a22;
  color: white;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Social Space 📱</h1>

  <div class="input-area">
    <input id="textInput" placeholder="Write something...">
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCJxIvRTvDSfJWJ6L4et9wwc1CAuDC-To",
  authDomain: "short-stuff-2450e.firebaseapp.com",
  projectId: "short-stuff-2450e",
  storageBucket: "short-stuff-2450e.firebasestorage.app",
  messagingSenderId: "896780231019",
  appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

// 👉 Create post (NOW SAVES TO FIREBASE)
window.post = async function () {
  const text = document.getElementById("textInput").value;
  if (!text) return;

  await addDoc(collection(db, "posts"), {
    text: text,
    createdAt: serverTimestamp()
  });

  document.getElementById("textInput").value = "";
};

// 👉 LIVE FEED (REAL TIME)
onSnapshot(collection(db, "posts"), (snapshot) => {
  feed.innerHTML = "";

  snapshot.forEach((doc) => {
    const post = doc.data();

    const div = document.createElement("div");
    div.className = "post";
    div.innerText = post.text;

    feed.prepend(div);
  });
});
</script>

</body>
</html>
