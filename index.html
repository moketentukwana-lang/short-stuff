<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #fff;
      margin: 0;
    }
    header {
      position: sticky;
      top: 0;
      background: #161b22;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo { font-size: 22px; font-weight: 700; color: #58a6ff; }
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr 250px;
      gap: 20px;
      padding: 20px;
    }
    aside, .feed-area, .right-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
    }
    .menu-item { padding: 12px; border-radius: 8px; cursor: pointer; }
    .menu-item:hover, .active { background: rgba(88,166,255,0.2); }
    .input-card { margin-bottom: 20px; }
    input {
      width: 100%; padding: 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.4); color: #fff;
    }
    button {
      width: 100%; margin-top: 10px; padding: 12px;
      border: none; border-radius: 8px;
      background: linear-gradient(135deg, #2d6cdf, #58a6ff);
      color: #fff; font-weight: bold; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .post {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .post-header { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #2d6cdf, cyan);
      display: flex; justify-content: center; align-items: center;
      font-weight: bold;
    }
    .actions { display: flex; gap: 10px; margin-top: 10px; }
    .action-btn {
      flex: 1; padding: 8px; border-radius: 6px;
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      cursor: pointer;
    }
    .floating-post {
      position: fixed; bottom: 20px; right: 20px;
      width: 55px; height: 55px; border-radius: 50%;
      background: #58a6ff; color: #fff; font-size: 28px;
      border: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Social Space</div>
    <div>🔔 💬 👤</div>
  </header>

  <div class="layout">
    <aside>
      <div class="menu-item active">🏠 Home</div>
      <div class="menu-item">🔥 Trending</div>
      <div class="menu-item">👥 Friends</div>
      <div class="menu-item">⚙ Settings</div>
    </aside>

    <main class="feed-area">
      <div class="input-card">
        <h3>Create Post</h3>
        <input id="textInput" placeholder="What's on your mind?" />
        <button id="postButton">Post</button>
      </div>
      <div id="feed"></div>
    </main>

    <aside class="right-panel">
      <h3>Trending</h3>
      <div>#Technology</div>
      <div>#AI</div>
      <div>#Gaming</div>
      <div>#Sports</div>
    </aside>
  </div>

  <button class="floating-post">+</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp,
      doc, updateDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "short-stuff-2450e.firebaseapp.com",
      projectId: "short-stuff-2450e",
      storageBucket: "short-stuff-2450e.appspot.com",
      messagingSenderId: "896780231019",
      appId: "YOUR_APP_ID"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const feed = document.getElementById("feed");
    const textInput = document.getElementById("textInput");
    const postButton = document.getElementById("postButton");

    async function createPost() {
      const text = textInput.value.trim();
      if (!text) return;
      await addDoc(collection(db, "posts"), {
        username: "Neo",
        text,
        likes: 0,
        createdAt: serverTimestamp()
      });
      textInput.value = "";
    }

    async function likePost(postId, currentLikes) {
      await updateDoc(doc(db, "posts", postId), { likes: currentLikes + 1 });
    }

    async function deletePost(postId) {
      await deleteDoc(doc(db, "posts", postId));
    }

    function renderFeed(snapshot) {
      feed.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const post = docSnap.data();
        const card = document.createElement("div");
        card.className = "post";
        card.innerHTML = `
          <div class="post-header">
            <div class="avatar">${post.username ? post.username[0] : "U"}</div>
            <div>
              <div class="name">${post.username || "Unknown"}</div>
              <small>${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : "Just posted"}</small>
            </div>
          </div>
          <div class="post-text">${post.text}</div>
          <div class="actions">
            <button class="action-btn like-btn">❤️ Like (${post.likes || 0})</button>
            <button class="action-btn delete-btn">🗑 Delete</button>
          </div>
        `;
        card.querySelector(".like-btn").addEventListener("click", () => {
          likePost(docSnap.id, post.likes || 0);
        });
        card.querySelector(".delete-btn").addEventListener("click", () => {
          deletePost(docSnap.id);
        });
        feed.appendChild(card);
      });
    }

    postButton.addEventListener("click", createPost);
    textInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        createPost();
      }
    });
    document.querySelector(".floating-post").addEventListener("click", () => textInput.focus());

    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, renderFeed);
  </script>
</body>
</html>
