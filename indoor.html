<!DOCTYPE html>
<html>
<head>
  <title>Q&A Website</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .question-box {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Q&A Website</h1>
  <p>Ask and answer questions from users</p>
</header>

<div class="container">

  <div class="question-box">
    <h3>Example Question</h3>
    <p>How does this website work?</p>
    <button>Answer</button>
  </div>

</div>

</body>
</html>
