<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Space</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1115;
  color: #e6e6e6;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 650px;
  margin: auto;
  padding-top: 20px;
}

/* TITLE */
h1 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
}

/* INPUT AREA */
.input-area {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #2a3142;
  background: #161a22;
  color: white;
  outline: none;
}

button.post-btn {
  background: #2d6cdf;
  border: none;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
}

/* FEED */
#feed {
  background: #161a22;
  padding: 15px;
  border-radius: 12px;
  min-height: 400px;
  border: 1px solid #222;
}

/* POST CARD */
.post {
  background: #1b2130;
  border: 1px solid #2a3142;
  border-radius: 12px;
  padding: 12px;
  margin: 12px 0;
}

/* HEADER */
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #2d6cdf;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
}

/* TEXT */
.post p {
  margin: 8px 0;
  color: #d6d6d6;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

button {
  background: transparent;
  border: 1px solid #2a3142;
  color: #e6e6e6;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #2a3142;
}

.like {
  color: #ff4d4d;
  border-color: #3a2a2a;
}

/* COMMENTS */
.comment-box {
  margin-top: 10px;
}

.comment-box input {
  width: 75%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid #2a3142;
  background: #0f1115;
  color: white;
}

.comment {
  font-size: 13px;
  margin-top: 5px;
  color: #bdbdbd;
}
</style>
</head>

<body>

<div class="container">
  <h1>Social Space 📱</h1>

  <div class="input-area">
    <input id="nameInput" placeholder="Your name">
    <input id="textInput" placeholder="What's on your mind?">
    <button class="post-btn" onclick="createPost()">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp,
  doc,
  updateDoc,
  increment,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJxIvRTvDSfJWJ6L4et9wwc1CAuDC-To",
  authDomain: "short-stuff-2450e.firebaseapp.com",
  projectId: "short-stuff-2450e",
  storageBucket: "short-stuff-2450e.firebasestorage.app",
  messagingSenderId: "896780231019",
  appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CREATE POST */
window.createPost = async function () {
  const name = document.getElementById("nameInput").value;
  const text = document.getElementById("textInput").value;

  if (!name || !text) return;

  await addDoc(collection(db, "posts"), {
    name,
    text,
    likes: 0,
    comments: [],
    createdAt: serverTimestamp()
  });

  document.getElementById("textInput").value = "";
};

/* LIKE POST */
window.likePost = async function (id) {
  const ref = doc(db, "posts", id);
  await updateDoc(ref, {
    likes: increment(1)
  });
};

/* COMMENT POST */
window.commentPost = async function (id) {
  const input = document.getElementById("c-" + id);
  const text = input.value;

  if (!text) return;

  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    comments: arrayUnion(text)
  });

  input.value = "";
};

/* REAL-TIME FEED */
const feed = document.getElementById("feed");

onSnapshot(collection(db, "posts"), (snapshot) => {
  feed.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const post = docSnap.data();
    const id = docSnap.id;

    const initial = post.name?.charAt(0).toUpperCase();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-header">
        <div class="avatar">${initial}</div>
        <strong>${post.name}</strong>
      </div>

      <p>${post.text}</p>

      <div class="actions">
        <button class="like" onclick="likePost('${id}')">
          ❤️ ${post.likes || 0}
        </button>
      </div>

      <div class="comment-box">
        <input id="c-${id}" placeholder="Write comment...">
        <button onclick="commentPost('${id}')">Send</button>

        <div>
          ${(post.comments || []).map(c => `<div class="comment">💬 ${c}</div>`).join("")}
        </div>
      </div>
    `;

    feed.appendChild(div);
  });
});
</script>

</body>
</html>
