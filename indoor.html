<!DOCTYPE html>
<html>
<head>
  <title>The Q&A Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: white;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #7c3aed);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(90deg, #8b5cf6, #ec4899);
      color: white;
      font-weight: bold;
      margin-right: 8px;
      margin-top: 8px;
    }

    .question {
      margin-top: 20px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
    }

    .answer {
      margin-top: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    small {
      opacity: 0.7;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<header>
  <h1>Q&A Hub</h1>
  <p>Ask questions and get answers from everyone</p>
</header>

<div class="container">

  <h3>Ask a Question</h3>

  <input id="nameInput" placeholder="Your name (or leave blank for Anonymous)">
  <input id="questionInput" placeholder="Type your question here...">
  <button onclick="postQuestion()">Post Question</button>

  <h3>Questions</h3>
  <div id="questionsList"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "short-stuff-2450e.firebaseapp.com",
    projectId: "short-stuff-2450e",
    storageBucket: "short-stuff-2450e.appspot.com",
    messagingSenderId: "896780231019",
    appId: "1:896780231019:web:df80fe761636fa67da6c2e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function postQuestion() {
    let text = document.getElementById("questionInput").value;
    let name = document.getElementById("nameInput").value;

    if (text.trim() === "") return;
    if (name.trim() === "") name = "Anonymous";

    db.collection("questions").add({
      text: text,
      name: name,
      likes: 0,
      answers: [],
      time: Date.now()
    });

    document.getElementById("questionInput").value = "";
  }

  function likeQuestion(id, likes) {
    db.collection("questions").doc(id).update({
      likes: likes + 1
    });
  }

  function deleteQuestion(id) {
    db.collection("questions").doc(id).delete();
  }

  function addAnswer(id) {
    let input = document.getElementById("answer-" + id);
    let answer = input.value;

    if (answer.trim() === "") return;

    db.collection("questions").doc(id).get().then(doc => {
      let answers = doc.data().answers || [];
      answers.push(answer);

      db.collection("questions").doc(id).update({
        answers: answers
      });

      input.value = "";
    });
  }

  function timeAgo(timestamp) {
    let seconds = Math.floor((Date.now() - timestamp) / 1000);

    if (seconds < 60) return seconds + " sec ago";

    let minutes = Math.floor(seconds / 60);
    if (minutes < 60) return minutes + " min ago";

    let hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + " hrs ago";

    let days = Math.floor(hours / 24);
    return days + " days ago";
  }

  function loadQuestions() {
    db.collection("questions")
      .orderBy("time", "desc")
      .onSnapshot(snapshot => {

        let html = "";

        snapshot.forEach(doc => {
          let q = doc.data();

          let answersHtml = "";
          if (q.answers) {
            q.answers.forEach(answer => {
              answersHtml += `<div class="answer">💬 ${answer}</div>`;
            });
          }

          html += `
            <div class="question">
              <strong>${q.name}</strong>
              <small> • ${timeAgo(q.time)}</small>

              <p>${q.text}</p>

              <button onclick="likeQuestion('${doc.id}', ${q.likes})">
                ❤️ ${q.likes}
              </button>

              <button onclick="deleteQuestion('${doc.id}')">
                Delete
              </button>

              <div>
                <input id="answer-${doc.id}" placeholder="Write an answer...">
                <button onclick="addAnswer('${doc.id}')">Reply</button>
              </div>

              ${answersHtml}
            </div>
          `;
        });

        document.getElementById("questionsList").innerHTML = html;
      });
  }

  loadQuestions();
</script>

</body>
</html>
