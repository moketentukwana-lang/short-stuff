<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social Space</title>

<style>
body <div class="topbar">Social Space</div>

<div class="container">

  <div class="input-card">
    <input id="textInput" placeholder="What's on your mind?" />
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>

</div>

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(15, 18, 25, 0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #1f2633;
}

/* MAIN LAYOUT */
.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

/* INPUT CARD */
.input-card {
  background: #121824;
  border: 1px solid #1f2633;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #232b3a;
  background: #0b0f14;
  color: white;
  outline: none;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2d6cdf;
  color: white;
  cursor: pointer;
}

/* FEED */
#feed {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* POST CARD */
.post {
  background: #121824;
  border: 1px solid #1f2633;
  border-radius: 14px;
  padding: 12px;
}

/* POST HEADER */
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #2d6cdf;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: white;
}

.name {
  font-weight: 600;
}

/* TEXT */
.post-text {
  margin: 10px 0;
  color: #cfd6e4;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.action-btn {
  background: transparent;
  border: 1px solid #2a3447;
  padding: 6px 10px;
  border-radius: 8px;
  color: #e6e6e6;
  cursor: pointer;
}

.action-btn:hover {
  background: #1c2433;
}
</style>
</head>

<body>

<div class="container">
  <h1>Social Space 📱</h1>

  <div class="input-area">
    <input id="textInput" placeholder="Write something...">
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCJxIvRTvDSfJWJ6L4et9wwc1CAuDC-To",
  authDomain: "short-stuff-2450e.firebaseapp.com",
  projectId: "short-stuff-2450e",
  storageBucket: "short-stuff-2450e.firebasestorage.app",
  messagingSenderId: "896780231019",
  appId: "1:896780231019:web:df80fe761636fa67da6c2e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

// 👉 Create post (NOW SAVES TO FIREBASE)
window.post = async function () {
  const text = document.getElementById("textInput").value;
  if (!text) return;

  await addDoc(collection(db, "posts"), {
    text: text,
    createdAt: serverTimestamp()
  });

  document.getElementById("textInput").value = "";
};

// 👉 LIVE FEED (REAL TIME)
onSnapshot(collection(db, "posts"), (snapshot) => {
  feed.innerHTML = "";

  snapshot.forEach((doc) => {
    const post = doc.data();

    const div = document.createElement("div");
    div.className = "post";
    div.innerText = post.text;

    feed.prepend(div);
  });
});
</script>

</body>
</html>
